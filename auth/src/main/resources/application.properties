spring.application.name=auth

# Server
server.port=8080

# MySQL (production)
spring.datasource.url=jdbc:mysql://localhost:3306/auth?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Logs
logging.file.name=logs/auth.log
logging.level.com.example.auth=INFO

spring.jpa.open-in-view=false

# Master Key AES-256 (OBLIGATOIRE - TP4)
app.master.key=${APP_MASTER_KEY}