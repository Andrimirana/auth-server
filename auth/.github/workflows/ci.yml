name: CI - Build, Test and SonarCloud

on:
  push:
    branches: [ "main", "tp4" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build, Test and SonarCloud
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Build and run tests (with JaCoCo coverage)
        run: mvn clean verify -Dspring.profiles.active=test
        env:
          APP_MASTER_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=

      - name: SonarCloud Scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          APP_MASTER_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
        run: mvn sonar:sonar -Dsonar.token=$SONAR_TOKEN -Dspring.profiles.active=test
